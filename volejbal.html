<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volejbal · Statistiky</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/*
  SUPABASE — spusť v SQL editoru:
  ─────────────────────────────────────────────────────────────
  CREATE TABLE vb_sezony (
    id bigserial PRIMARY KEY, created_at timestamptz DEFAULT now(),
    nazev text NOT NULL, aktivni boolean DEFAULT false
  );
  CREATE TABLE vb_hraci (
    id bigserial PRIMARY KEY, created_at timestamptz DEFAULT now(),
    jmeno text NOT NULL, cislo int, pozice text DEFAULT 'smečař'
  );
  CREATE TABLE vb_hraci_sezony (
    hrac_id bigint REFERENCES vb_hraci(id) ON DELETE CASCADE,
    sezona_id bigint REFERENCES vb_sezony(id) ON DELETE CASCADE,
    PRIMARY KEY (hrac_id, sezona_id)
  );
  CREATE TABLE vb_zapasy (
    id bigserial PRIMARY KEY, created_at timestamptz DEFAULT now(),
    sezona_id bigint REFERENCES vb_sezony(id),
    datum date NOT NULL, cas time, soupet text NOT NULL,
    misto text DEFAULT 'doma', stav text DEFAULT 'planovany',
    sety_my int, sety_oni int,
    set1_my int, set1_oni int, set2_my int, set2_oni int,
    set3_my int, set3_oni int, set4_my int, set4_oni int,
    set5_my int, set5_oni int, poznamka text
  );
  CREATE TABLE vb_statistiky (
    id bigserial PRIMARY KEY, created_at timestamptz DEFAULT now(),
    zapas_id bigint REFERENCES vb_zapasy(id) ON DELETE CASCADE,
    hrac_id bigint REFERENCES vb_hraci(id) ON DELETE CASCADE,
    utok_plus int DEFAULT 0, utok_minus int DEFAULT 0, utok_neutral int DEFAULT 0,
    servis_plus int DEFAULT 0, servis_minus int DEFAULT 0, servis_neutral int DEFAULT 0,
    blok_plus int DEFAULT 0, blok_minus int DEFAULT 0, blok_neutral int DEFAULT 0,
    prijem_plus int DEFAULT 0, prijem_minus int DEFAULT 0, prijem_neutral int DEFAULT 0,
    vykop_plus int DEFAULT 0, vykop_minus int DEFAULT 0, vykop_neutral int DEFAULT 0,
    nahravka_plus int DEFAULT 0, nahravka_minus int DEFAULT 0, nahravka_neutral int DEFAULT 0,
    UNIQUE(zapas_id, hrac_id)
  );
  ALTER TABLE vb_sezony DISABLE ROW LEVEL SECURITY;
  ALTER TABLE vb_hraci DISABLE ROW LEVEL SECURITY;
  ALTER TABLE vb_hraci_sezony DISABLE ROW LEVEL SECURITY;
  ALTER TABLE vb_zapasy DISABLE ROW LEVEL SECURITY;
  ALTER TABLE vb_statistiky DISABLE ROW LEVEL SECURITY;
  ─────────────────────────────────────────────────────────────
*/
:root{
  --bg:#080c16;--surface:#0f1523;--surface2:#1a2035;--border:#2a3450;
  --text:#e8eaf0;--muted:#6b7a99;--accent:#f97316;--accent2:#4dabf7;
  --green:#51cf66;--red:#ff6b6b;--yellow:#ffd43b;--purple:#7950f2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;flex-direction:column;gap:14px}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay.hidden{display:none}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;overflow-x:auto}
.nav-brand{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--accent);padding:14px 20px;white-space:nowrap;letter-spacing:.5px}
.nav-tabs{display:flex;flex:1}
.nav-tab{padding:14px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;background:none;border-top:none;border-left:none;border-right:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* SEASON BAR */
.season-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.season-bar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.season-bar select:focus{outline:none;border-color:var(--accent)}
.season-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* CONTENT */
.tab-content{display:none;padding:20px;max-width:1200px;margin:0 auto}
.tab-content.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-icon{font-size:24px;margin-bottom:6px}
.stat-val{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:hover{opacity:.88}

/* MATCH LIST */
.match-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.match-date{font-size:12px;color:var(--muted);min-width:80px}
.match-vs{font-weight:700;font-size:15px;flex:1}
.match-score{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--accent);min-width:60px;text-align:center}
.match-score.win{color:var(--green)}
.match-score.lose{color:var(--red)}
.match-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.badge-planovany{background:#1a2035;color:var(--muted);border:1px solid var(--border)}
.badge-probiha{background:rgba(249,115,22,.15);color:var(--accent);border:1px solid rgba(249,115,22,.3);animation:pulse 2s infinite}
.badge-dokonceny{background:rgba(81,207,102,.1);color:var(--green);border:1px solid rgba(81,207,102,.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.match-misto{font-size:12px;color:var(--muted)}
.match-actions{display:flex;gap:6px;flex-wrap:wrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* PLAYER LIST */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.player-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px}
.player-card.inactive{opacity:.45}
.player-num{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.player-num.no-num{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px}
.player-info{flex:1;min-width:0}
.player-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-pos{font-size:11px;color:var(--muted);margin-top:2px}
.player-toggle{cursor:pointer;font-size:18px;flex-shrink:0;border:none;background:none;padding:4px}

/* LIVE TABLE */
.live-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
.live-table{border-collapse:collapse;min-width:100%;white-space:nowrap}
.live-table th,.live-table td{border:1px solid var(--border)}
.live-table th{background:var(--surface2);text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:8px 4px;color:var(--muted)}
.live-table th.action-header{color:var(--text);font-size:13px}
.live-table th.sticky-col,.live-table td.sticky-col{position:sticky;left:0;z-index:2;background:var(--surface);min-width:130px;max-width:160px}
.live-table th.sticky-col{background:var(--surface2)}
.sc{cursor:pointer;text-align:center;padding:4px 3px;transition:background .1s;min-width:52px;user-select:none}
.sc:hover{filter:brightness(1.15)}
.sc:active{transform:scale(.94)}
.sc.plus{background:rgba(81,207,102,.08)}
.sc.minus{background:rgba(255,107,107,.08)}
.sc.neutral{background:rgba(255,212,59,.08)}
.sc-btn{font-size:16px;font-weight:700;display:block;line-height:1.4}
.sc.plus .sc-btn{color:var(--green)}
.sc.minus .sc-btn{color:var(--red)}
.sc.neutral .sc-btn{color:var(--yellow)}
.sc-count{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;display:block;color:var(--text);line-height:1.2;padding-bottom:3px}
.player-row-name{padding:10px 12px;font-weight:600;font-size:13px}
.player-row-num{font-size:11px;color:var(--muted);font-weight:400}

/* LIVE HEADER */
.live-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.live-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;flex:1;min-width:200px}
.live-select:focus{outline:none;border-color:var(--accent)}

/* STATS TABLE */
.stats-table{width:100%;border-collapse:collapse}
.stats-table th,.stats-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.stats-table th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;background:var(--surface2)}
.stats-table tr:last-child td{border-bottom:none}
.stats-table tr:hover td{background:rgba(255,255,255,.03)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;display:block;margin-bottom:12px}
.empty-text{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}

/* SECTION TITLE */
.section-title{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px}

/* SCORE FORM */
.sets-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:4px}
.sets-grid label{font-size:11px;color:var(--muted);text-align:center;display:block;margin-bottom:4px}
.sets-grid .set-pair{display:flex;gap:4px;align-items:center}
.sets-grid .set-pair span{color:var(--muted);font-size:12px}
.sets-grid input{width:100%;text-align:center}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}

/* POSITION BADGES */
.pos-smec{color:#4dabf7}.pos-nahravac{color:#7950f2}.pos-libero{color:#f97316}.pos-universal{color:#51cf66}

/* RESPONSIVE */
@media(max-width:600px){
  .form-row{grid-template-columns:1fr}
  .tab-content{padding:12px}
  .nav-brand{padding:12px 12px}
  .nav-tab{padding:12px 10px;font-size:12px}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loader"></div>
  <div style="color:var(--muted);font-size:14px">Načítám data…</div>
</div>

<div class="toast" id="toast"></div>

<nav class="nav">
  <div class="nav-brand">🏐 VOLEJBAL</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('prehled')">📊 Přehled</button>
    <button class="nav-tab" onclick="showTab('zapasy')">🏆 Zápasy</button>
    <button class="nav-tab" onclick="showTab('tym')">👥 Tým</button>
    <button class="nav-tab" onclick="showTab('live')">⚡ Live</button>
    <button class="nav-tab" onclick="showTab('statistiky')">📈 Statistiky</button>
  </div>
</nav>

<div class="season-bar">
  <span class="season-label">Sezóna</span>
  <select id="season-select" onchange="onSeasonChange()">
    <option value="">— žádná sezóna —</option>
  </select>
  <button class="btn btn-sm btn-secondary" onclick="openModal('modal-sezona')">+ Nová sezóna</button>
</div>

<!-- ═══════════════════════════════════ PŘEHLED ═══════════════════════════════════ -->
<div class="tab-content active" id="tab-prehled">
  <div id="prehled-content">
    <div class="empty"><span class="empty-icon">📊</span><div class="empty-text">Vyberte sezónu</div></div>
  </div>
</div>

<!-- ═══════════════════════════════════ ZÁPASY ═══════════════════════════════════ -->
<div class="tab-content" id="tab-zapasy">
  <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
    <button class="btn btn-primary" onclick="openModal('modal-zapas')">+ Nový zápas</button>
  </div>
  <div id="zapasy-list"><div class="empty"><span class="empty-icon">🏆</span><div class="empty-text">Žádné zápasy</div></div></div>
</div>

<!-- ═══════════════════════════════════ TÝM ═══════════════════════════════════ -->
<div class="tab-content" id="tab-tym">
  <div style="display:flex;justify-content:flex-end;margin-bottom:16px;gap:8px;flex-wrap:wrap">
    <button class="btn btn-secondary" onclick="openModal('modal-hrac')">+ Přidat hráčku</button>
  </div>
  <div id="tym-season-note" style="margin-bottom:12px;font-size:13px;color:var(--muted)"></div>
  <div id="hraci-list"><div class="empty"><span class="empty-icon">👥</span><div class="empty-text">Žádné hráčky</div></div></div>
</div>

<!-- ═══════════════════════════════════ LIVE ═══════════════════════════════════ -->
<div class="tab-content" id="tab-live">
  <div class="live-header">
    <select class="live-select" id="live-zapas-select" onchange="onLiveZapasChange()">
      <option value="">— vyberte zápas —</option>
    </select>
    <button class="btn btn-sm btn-primary" id="btn-start-zapas" style="display:none" onclick="startZapas()">▶ Zahájit</button>
    <button class="btn btn-sm btn-green" id="btn-end-zapas" style="display:none" onclick="openFinishModal()">✓ Ukončit</button>
  </div>
  <div id="live-table-wrap">
    <div class="empty"><span class="empty-icon">⚡</span><div class="empty-text">Vyberte probíhající zápas</div><div>Nebo zahajte plánovaný zápas</div></div>
  </div>
</div>

<!-- ═══════════════════════════════════ STATISTIKY ═══════════════════════════════════ -->
<div class="tab-content" id="tab-statistiky">
  <div id="stats-content"><div class="empty"><span class="empty-icon">📈</span><div class="empty-text">Vyberte sezónu</div></div></div>
</div>

<!-- ═══════ MODALS ═══════ -->

<!-- Nová sezóna -->
<div class="modal-overlay hidden" id="modal-sezona">
  <div class="modal">
    <div class="modal-title">🗓️ Nová sezóna</div>
    <div class="form-group">
      <label class="form-label">Název sezóny</label>
      <input class="form-input" id="in-sezona-nazev" placeholder="např. 2024/2025" />
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="in-sezona-aktivni" style="width:16px;height:16px">
        <span style="font-size:14px">Nastavit jako aktivní sezónu</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-sezona')">Zrušit</button>
      <button class="btn btn-primary" onclick="saveSezona()">Vytvořit</button>
    </div>
  </div>
</div>

<!-- Nový zápas -->
<div class="modal-overlay hidden" id="modal-zapas">
  <div class="modal">
    <div class="modal-title">🏐 Nový zápas</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Datum *</label>
        <input type="date" class="form-input" id="in-zapas-datum" />
      </div>
      <div class="form-group">
        <label class="form-label">Čas</label>
        <input type="time" class="form-input" id="in-zapas-cas" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Soupeř *</label>
      <input class="form-input" id="in-zapas-soupet" placeholder="název soupeře" />
    </div>
    <div class="form-group">
      <label class="form-label">Místo</label>
      <select class="form-input" id="in-zapas-misto">
        <option value="doma">Doma</option>
        <option value="venku">Venku</option>
        <option value="neutral">Neutrální</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-zapas')">Zrušit</button>
      <button class="btn btn-primary" onclick="saveZapas()">Vytvořit zápas</button>
    </div>
  </div>
</div>

<!-- Přidat hráčku -->
<div class="modal-overlay hidden" id="modal-hrac">
  <div class="modal">
    <div class="modal-title">👤 Přidat hráčku</div>
    <div class="form-group">
      <label class="form-label">Jméno *</label>
      <input class="form-input" id="in-hrac-jmeno" placeholder="jméno hráčky" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Číslo dresu</label>
        <input type="number" class="form-input" id="in-hrac-cislo" placeholder="7" />
      </div>
      <div class="form-group">
        <label class="form-label">Pozice</label>
        <select class="form-input" id="in-hrac-pozice">
          <option value="smečař">Smečař</option>
          <option value="nahrávač">Nahrávač</option>
          <option value="libero">Libero</option>
          <option value="universál">Universál</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-hrac')">Zrušit</button>
      <button class="btn btn-primary" onclick="saveHrac()">Přidat</button>
    </div>
  </div>
</div>

<!-- Výsledek zápasu -->
<div class="modal-overlay hidden" id="modal-vysledek">
  <div class="modal">
    <div class="modal-title" id="vysledek-title">✅ Výsledek zápasu</div>
    <input type="hidden" id="vysledek-zapas-id" />
    <div class="form-group">
      <label class="form-label">Sety (my : oni)</label>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">MY</label>
          <input type="number" class="form-input" id="in-sety-my" min="0" max="3" placeholder="0" />
        </div>
        <div class="form-group">
          <label class="form-label">ONI</label>
          <input type="number" class="form-input" id="in-sety-oni" min="0" max="3" placeholder="0" />
        </div>
      </div>
    </div>
    <div class="section-title">Body v setech</div>
    <div id="sets-detail-form"></div>
    <div class="form-group" style="margin-top:12px">
      <label class="form-label">Poznámka</label>
      <input class="form-input" id="in-vysledek-poznamka" placeholder="volitelná poznámka" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-vysledek')">Zrušit</button>
      <button class="btn btn-green" onclick="saveVysledek()">Uložit výsledek</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://fcycbzbzhuslmkfbgryb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjeWNiemJ6aHVzbG1rZmJncnliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjcyNjksImV4cCI6MjA5MzgwMzI2OX0.Ho8tJ0GnL5pcF8uqHlEnuf4Dy6gza03jwrDslVTMrts';

const ACTIONS=[
  {key:'utok',label:'Útok',icon:'💥'},
  {key:'servis',label:'Servis',icon:'🎯'},
  {key:'blok',label:'Blok',icon:'🛡️'},
  {key:'prijem',label:'Příjem',icon:'🤲'},
  {key:'vykop',label:'Výkop',icon:'🏃'},
  {key:'nahravka',label:'Nahrávka',icon:'🎪'},
];
const VARIANTS=[
  {suf:'plus',sym:'+',cls:'plus'},
  {suf:'minus',sym:'−',cls:'minus'},
  {suf:'neutral',sym:'/',cls:'neutral'},
];

const state={sezony:[],activeSeason:null,hraci:[],hraciSezony:[],zapasy:[],statistiky:[],liveZapasId:null};
const debounceMap={};
const dirtyStats={};

async function api(method,path,body){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{
    method,
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':'return=representation'},
    body:body?JSON.stringify(body):undefined
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=r.status===204?null:await r.json();
  return t;
}
async function apiUpsert(table,body,conflict){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${conflict}`,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'},
    body:JSON.stringify(body)
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.status===204?null:await r.json();
}
async function apiPatch(table,id,body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(body)
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return r.status===204?null:await r.json();
}

async function init(){
  try{
    const [sez,hr,hs,zap,stat]=await Promise.all([
      api('GET','vb_sezony?order=id.desc'),
      api('GET','vb_hraci?order=jmeno.asc'),
      api('GET','vb_hraci_sezony'),
      api('GET','vb_zapasy?order=datum.desc'),
      api('GET','vb_statistiky'),
    ]);
    state.sezony=sez||[];
    state.hraci=hr||[];
    state.hraciSezony=hs||[];
    state.zapasy=zap||[];
    state.statistiky=stat||[];
    state.activeSeason=(sez||[]).find(s=>s.aktivni)||null;
    renderSeasonSelect();
    renderAll();
  }catch(e){toast('Chyba načítání: '+e.message,'error');}
  finally{document.getElementById('loading').classList.add('hidden');}
}

function renderSeasonSelect(){
  const sel=document.getElementById('season-select');
  sel.innerHTML='<option value="">— žádná sezóna —</option>';
  state.sezony.forEach(s=>{
    const o=document.createElement('option');
    o.value=s.id;
    o.textContent=s.nazev+(s.aktivni?' ★':'');
    if(state.activeSeason&&s.id===state.activeSeason.id)o.selected=true;
    sel.appendChild(o);
  });
}

function currentSeasonId(){
  const v=document.getElementById('season-select').value;
  return v?parseInt(v):null;
}

function onSeasonChange(){
  const id=currentSeasonId();
  state.activeSeason=state.sezony.find(s=>s.id===id)||null;
  renderAll();
}

function renderAll(){
  renderPrehled();
  renderZapasy();
  renderTym();
  renderLiveSelect();
  renderStatistiky();
}

/* ─── PŘEHLED ─── */
function renderPrehled(){
  const sid=currentSeasonId();
  const el=document.getElementById('prehled-content');
  if(!sid){el.innerHTML='<div class="empty"><span class="empty-icon">📊</span><div class="empty-text">Vyberte sezónu nahoře</div></div>';return;}
  const zapasy=state.zapasy.filter(z=>z.sezona_id===sid);
  const done=zapasy.filter(z=>z.stav==='dokonceny');
  const wins=done.filter(z=>z.sety_my>z.sety_oni).length;
  const losses=done.filter(z=>z.sety_my<z.sety_oni).length;
  const sezNazev=state.sezony.find(s=>s.id===sid)?.nazev||'—';

  el.innerHTML=`
    <div class="card" style="border-color:var(--accent);margin-bottom:16px">
      <div style="font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--accent)">${sezNazev}</div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px">${hraciVSezoně(sid).length} hráček v soupisce</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">🏐</div><div class="stat-val">${zapasy.length}</div><div class="stat-label">Zápasy</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val" style="color:var(--green)">${wins}</div><div class="stat-label">Výhry</div></div>
      <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-val" style="color:var(--red)">${losses}</div><div class="stat-label">Porážky</div></div>
      <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val">${done.length?Math.round(wins/done.length*100)+'%':'—'}</div><div class="stat-label">Úspěšnost</div></div>
    </div>
    <div class="section-title">Poslední zápasy</div>
    ${done.slice(0,5).map(z=>matchHtml(z)).join('')||'<div class="empty" style="padding:20px"><span class="empty-icon" style="font-size:24px">—</span><div>Zatím žádné dokončené zápasy</div></div>'}
  `;
}

/* ─── ZÁPASY ─── */
function renderZapasy(){
  const sid=currentSeasonId();
  const el=document.getElementById('zapasy-list');
  const list=sid?state.zapasy.filter(z=>z.sezona_id===sid):state.zapasy;
  if(!list.length){el.innerHTML='<div class="empty"><span class="empty-icon">🏆</span><div class="empty-text">Žádné zápasy</div><div>Přidej první zápas</div></div>';return;}
  el.innerHTML=list.map(z=>matchHtml(z,true)).join('');
}

function matchHtml(z,withActions=false){
  const win=z.stav==='dokonceny'&&z.sety_my>z.sety_oni;
  const lose=z.stav==='dokonceny'&&z.sety_my<z.sety_oni;
  const score=z.stav==='dokonceny'&&z.sety_my!=null?`<span class="match-score ${win?'win':lose?'lose':''}">${z.sety_my}:${z.sety_oni}</span>`:'<span class="match-score" style="color:var(--muted)">—:—</span>';
  const badge=`<span class="match-badge badge-${z.stav==='probihajici'?'probiha':z.stav==='dokonceny'?'dokonceny':'planovany'}">${stavLabel(z.stav)}</span>`;
  const misto=z.misto==='doma'?'🏠 Doma':z.misto==='venku'?'✈️ Venku':'⚖️ Neutrál';
  let actions='';
  if(withActions){
    if(z.stav==='planovany')actions=`<button class="btn btn-sm btn-primary" onclick="goLive(${z.id})">⚡ Live</button><button class="btn btn-sm btn-secondary" onclick="editVysledek(${z.id})">📝 Výsledek</button><button class="btn btn-sm btn-red" onclick="deleteZapas(${z.id})">🗑️</button>`;
    else if(z.stav==='probihajici')actions=`<button class="btn btn-sm btn-primary" onclick="goLive(${z.id})">⚡ Live</button><button class="btn btn-sm btn-green" onclick="editVysledek(${z.id})">✓ Ukončit</button>`;
    else actions=`<button class="btn btn-sm btn-secondary" onclick="editVysledek(${z.id})">✏️ Upravit</button><button class="btn btn-sm btn-red" onclick="deleteZapas(${z.id})">🗑️</button>`;
  }
  return `<div class="match-item">
    <div class="match-date">${fmtDate(z.datum)}${z.cas?'<br><span style="font-size:11px">'+z.cas.slice(0,5)+'</span>':''}</div>
    ${score}
    <div style="flex:1;min-width:120px"><div class="match-vs">${z.soupet}</div><div class="match-misto">${misto}</div></div>
    ${badge}
    ${withActions?`<div class="match-actions">${actions}</div>`:''}
  </div>`;
}

function stavLabel(s){return s==='planovany'?'Plánovaný':s==='probihajici'?'Probíhá':'Dokončený';}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return`${p[2]}.${p[1]}.${p[0]}`;}

/* ─── TÝM ─── */
function hraciVSezoně(sid){
  if(!sid)return state.hraci;
  const ids=state.hraciSezony.filter(hs=>hs.sezona_id===sid).map(hs=>hs.hrac_id);
  return state.hraci.filter(h=>ids.includes(h.id));
}
function isHracInSezona(hracId,sid){
  return state.hraciSezony.some(hs=>hs.hrac_id===hracId&&hs.sezona_id===sid);
}

function renderTym(){
  const sid=currentSeasonId();
  const el=document.getElementById('hraci-list');
  const note=document.getElementById('tym-season-note');
  if(sid){note.textContent='Přepínačem aktivujete/deaktivujete hráčku pro vybranou sezónu.';}
  else{note.textContent='Zobrazeni všichni hráči. Vyberte sezónu pro správu soupisky.';}
  if(!state.hraci.length){el.innerHTML='<div class="empty"><span class="empty-icon">👥</span><div class="empty-text">Žádné hráčky</div></div>';return;}
  const active=sid?hraciVSezoně(sid):state.hraci;
  const inactive=sid?state.hraci.filter(h=>!active.includes(h)):[];
  let html='';
  if(sid){html+='<div class="section-title">V soupisce ('+active.length+')</div>';}
  html+=active.map(h=>playerCardHtml(h,sid,true)).join('');
  if(sid&&inactive.length){
    html+='<div class="section-title" style="margin-top:20px">Mimo soupisku</div>';
    html+=inactive.map(h=>playerCardHtml(h,sid,false)).join('');
  }
  el.innerHTML=html||'<div class="empty"><span class="empty-icon">👥</span><div class="empty-text">Žádné hráčky</div></div>';
}

function playerCardHtml(h,sid,inSeason){
  const posClass=`pos-${h.pozice==='nahrávač'?'nahravac':h.pozice==='libero'?'libero':h.pozice==='universál'?'universal':'smec'}`;
  const numEl=h.cislo?`<div class="player-num">${h.cislo}</div>`:`<div class="player-num no-num">?</div>`;
  const toggle=sid?`<button class="player-toggle" title="${inSeason?'Odebrat ze soupisky':'Přidat do soupisky'}" onclick="toggleHracSezona(${h.id},${sid},${inSeason})">${inSeason?'✅':'➕'}</button>`:'';
  return `<div class="player-card ${sid&&!inSeason?'inactive':''}" id="pc-${h.id}">
    ${numEl}
    <div class="player-info">
      <div class="player-name">${h.jmeno}</div>
      <div class="player-pos ${posClass}">${h.pozice||'—'}</div>
    </div>
    ${toggle}
  </div>`;
}

async function toggleHracSezona(hracId,sezonaId,inSeason){
  try{
    if(inSeason){
      await fetch(`${SB_URL}/rest/v1/vb_hraci_sezony?hrac_id=eq.${hracId}&sezona_id=eq.${sezonaId}`,{
        method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
      });
      state.hraciSezony=state.hraciSezony.filter(hs=>!(hs.hrac_id===hracId&&hs.sezona_id===sezonaId));
    }else{
      await apiUpsert('vb_hraci_sezony',{hrac_id:hracId,sezona_id:sezonaId},'hrac_id,sezona_id');
      if(!state.hraciSezony.some(hs=>hs.hrac_id===hracId&&hs.sezona_id===sezonaId)){
        state.hraciSezony.push({hrac_id:hracId,sezona_id:sezonaId});
      }
    }
    renderTym();renderPrehled();renderLiveSelect();
  }catch(e){toast('Chyba: '+e.message,'error');}
}

/* ─── LIVE ─── */
function renderLiveSelect(){
  const sid=currentSeasonId();
  const sel=document.getElementById('live-zapas-select');
  const zapasy=sid?state.zapasy.filter(z=>z.sezona_id===sid&&(z.stav==='planovany'||z.stav==='probihajici')):state.zapasy.filter(z=>z.stav==='planovany'||z.stav==='probihajici');
  const prev=sel.value;
  sel.innerHTML='<option value="">— vyberte zápas —</option>';
  zapasy.forEach(z=>{
    const o=document.createElement('option');
    o.value=z.id;
    o.textContent=`${fmtDate(z.datum)} — ${z.soupet} [${stavLabel(z.stav)}]`;
    if(parseInt(prev)===z.id)o.selected=true;
    sel.appendChild(o);
  });
  if(state.liveZapasId)renderLiveTable(state.liveZapasId);
}

function onLiveZapasChange(){
  const v=document.getElementById('live-zapas-select').value;
  if(!v){
    state.liveZapasId=null;
    document.getElementById('live-table-wrap').innerHTML='<div class="empty"><span class="empty-icon">⚡</span><div class="empty-text">Vyberte zápas</div></div>';
    document.getElementById('btn-start-zapas').style.display='none';
    document.getElementById('btn-end-zapas').style.display='none';
    return;
  }
  const id=parseInt(v);
  state.liveZapasId=id;
  const z=state.zapasy.find(z=>z.id===id);
  document.getElementById('btn-start-zapas').style.display=z?.stav==='planovany'?'':'none';
  document.getElementById('btn-end-zapas').style.display=z?.stav==='probihajici'?'':'none';
  renderLiveTable(id);
}

async function startZapas(){
  const id=state.liveZapasId;if(!id)return;
  try{
    await apiPatch('vb_zapasy',id,{stav:'probihajici'});
    const z=state.zapasy.find(z=>z.id===id);if(z)z.stav='probihajici';
    document.getElementById('btn-start-zapas').style.display='none';
    document.getElementById('btn-end-zapas').style.display='';
    renderZapasy();renderLiveSelect();
    toast('Zápas zahájen','success');
  }catch(e){toast('Chyba: '+e.message,'error');}
}

function goLive(zapasId){
  showTab('live');
  const sel=document.getElementById('live-zapas-select');
  sel.value=zapasId;
  onLiveZapasChange();
}

function openFinishModal(){
  if(state.liveZapasId)editVysledek(state.liveZapasId,true);
}

function renderLiveTable(zapasId){
  const sid=currentSeasonId();
  const hraci=hraciVSezoně(sid||state.zapasy.find(z=>z.id===zapasId)?.sezona_id||0);
  const el=document.getElementById('live-table-wrap');
  if(!hraci.length){el.innerHTML='<div class="empty"><span class="empty-icon">👥</span><div class="empty-text">Soupiska je prázdná</div><div>Přidejte hráčky do sezóny v záložce Tým</div></div>';return;}

  // ensure stat objects exist in memory
  hraci.forEach(h=>ensureStat(zapasId,h.id));

  let thead1=`<tr><th class="sticky-col" rowspan="2">Hráčka</th>`;
  let thead2=`<tr>`;
  ACTIONS.forEach(a=>{
    thead1+=`<th class="action-header" colspan="3">${a.icon} ${a.label}</th>`;
    VARIANTS.forEach(v=>{thead2+=`<th class="${v.cls==='plus'?'':v.cls==='minus'?'':''}" style="font-size:16px;padding:6px 8px">${v.sym}</th>`;});
  });
  thead1+=`</tr>`;thead2+=`</tr>`;

  let tbody='';
  hraci.forEach(h=>{
    tbody+=`<tr><td class="sticky-col player-row-name">${h.jmeno}${h.cislo?` <span class="player-row-num">#${h.cislo}</span>`:''}</td>`;
    ACTIONS.forEach(a=>{
      VARIANTS.forEach(v=>{
        const field=`${a.key}_${v.suf}`;
        const val=getStatVal(zapasId,h.id,field);
        tbody+=`<td class="sc ${v.cls}" onclick="bump(${h.id},${zapasId},'${field}')"><span class="sc-btn">${v.sym}</span><span class="sc-count" id="cnt-${h.id}-${field}">${val}</span></td>`;
      });
    });
    tbody+=`</tr>`;
  });

  el.innerHTML=`<div class="live-wrap"><table class="live-table"><thead>${thead1}${thead2}</thead><tbody>${tbody}</tbody></table></div>`;
}

function ensureStat(zapasId,hracId){
  const key=`${zapasId}_${hracId}`;
  if(!dirtyStats[key]){
    const existing=state.statistiky.find(s=>s.zapas_id===zapasId&&s.hrac_id===hracId);
    dirtyStats[key]=existing?{...existing}:makeEmptyStat(zapasId,hracId);
  }
}

function makeEmptyStat(zapasId,hracId){
  const o={zapas_id:zapasId,hrac_id:hracId};
  ACTIONS.forEach(a=>VARIANTS.forEach(v=>{o[`${a.key}_${v.suf}`]=0;}));
  return o;
}

function getStatVal(zapasId,hracId,field){
  const key=`${zapasId}_${hracId}`;
  if(dirtyStats[key])return dirtyStats[key][field]||0;
  const s=state.statistiky.find(s=>s.zapas_id===zapasId&&s.hrac_id===hracId);
  return s?s[field]||0:0;
}

function bump(hracId,zapasId,field){
  ensureStat(zapasId,hracId);
  const key=`${zapasId}_${hracId}`;
  dirtyStats[key][field]=(dirtyStats[key][field]||0)+1;
  const el=document.getElementById(`cnt-${hracId}-${field}`);
  if(el)el.textContent=dirtyStats[key][field];
  clearTimeout(debounceMap[key]);
  debounceMap[key]=setTimeout(()=>flushStat(key),800);
}

async function flushStat(key){
  const data=dirtyStats[key];if(!data)return;
  try{
    const res=await apiUpsert('vb_statistiky',data,'zapas_id,hrac_id');
    if(res&&res[0]){
      const idx=state.statistiky.findIndex(s=>s.zapas_id===data.zapas_id&&s.hrac_id===data.hrac_id);
      if(idx>=0)state.statistiky[idx]=res[0];else state.statistiky.push(res[0]);
    }
  }catch(e){toast('Chyba uložení: '+e.message,'error');}
}

/* ─── STATISTIKY ─── */
function renderStatistiky(){
  const sid=currentSeasonId();
  const el=document.getElementById('stats-content');
  if(!sid){el.innerHTML='<div class="empty"><span class="empty-icon">📈</span><div class="empty-text">Vyberte sezónu</div></div>';return;}
  const hraci=hraciVSezoně(sid);
  if(!hraci.length){el.innerHTML='<div class="empty"><span class="empty-icon">📈</span><div class="empty-text">Prázdná soupiska</div></div>';return;}
  const zapasy=state.zapasy.filter(z=>z.sezona_id===sid&&z.stav==='dokonceny');
  if(!zapasy.length){el.innerHTML='<div class="empty"><span class="empty-icon">📈</span><div class="empty-text">Žádné dokončené zápasy</div></div>';return;}
  const zapasIds=zapasy.map(z=>z.id);

  const rows=hraci.map(h=>{
    const stats=state.statistiky.filter(s=>s.hrac_id===h.id&&zapasIds.includes(s.zapas_id));
    const sum=(f)=>stats.reduce((acc,s)=>acc+(s[f]||0),0);
    return {h,stats,
      utok_plus:sum('utok_plus'),servis_plus:sum('servis_plus'),blok_plus:sum('blok_plus'),
      prijem_plus:sum('prijem_plus'),vykop_plus:sum('vykop_plus'),nahravka_plus:sum('nahravka_plus'),
      total:ACTIONS.reduce((a,ac)=>a+sum(ac.key+'_plus'),0)
    };
  }).sort((a,b)=>b.total-a.total);

  let html=`<div class="section-title">Žebříček — pozitivní body</div>`;
  html+=`<div style="overflow-x:auto"><table class="stats-table">
    <thead><tr>
      <th>#</th><th>Hráčka</th>
      ${ACTIONS.map(a=>`<th>${a.icon} ${a.label}</th>`).join('')}
      <th>Celkem</th>
    </tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    html+=`<tr>
      <td style="color:var(--muted);font-weight:700">${i+1}</td>
      <td><strong>${r.h.jmeno}</strong>${r.h.cislo?` <span style="color:var(--muted);font-size:11px">#${r.h.cislo}</span>`:''}</td>
      ${ACTIONS.map(a=>`<td style="color:var(--green);font-weight:600">${r[a.key+'_plus']||0}</td>`).join('')}
      <td style="color:var(--accent);font-family:'Oswald',sans-serif;font-size:16px;font-weight:700">${r.total}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  // detailed per-action leaderboard
  html+=`<div class="section-title" style="margin-top:24px">Detail akcí</div>`;
  html+=`<div class="stats-grid">`;
  ACTIONS.forEach(a=>{
    const best=rows.filter(r=>r[a.key+'_plus']>0).sort((x,y)=>y[a.key+'_plus']-x[a.key+'_plus']).slice(0,3);
    html+=`<div class="stat-card" style="text-align:left">
      <div style="font-size:20px;margin-bottom:6px">${a.icon} <strong style="font-size:14px">${a.label}</strong></div>
      ${best.length?best.map((r,i)=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid var(--border)"><span>${i+1}. ${r.h.jmeno}</span><span style="color:var(--green);font-weight:700">${r[a.key+'_plus']}</span></div>`).join(''):'<div style="color:var(--muted);font-size:12px">Žádná data</div>'}
    </div>`;
  });
  html+=`</div>`;

  el.innerHTML=html;
}

/* ─── SAVE SEASON ─── */
async function saveSezona(){
  const nazev=document.getElementById('in-sezona-nazev').value.trim();
  if(!nazev){toast('Zadej název sezóny','error');return;}
  const aktivni=document.getElementById('in-sezona-aktivni').checked;
  try{
    if(aktivni){
      // deactivate others
      for(const s of state.sezony.filter(s=>s.aktivni)){
        await apiPatch('vb_sezony',s.id,{aktivni:false});
        s.aktivni=false;
      }
    }
    const res=await api('POST','vb_sezony',{nazev,aktivni});
    const ns=res[0];
    state.sezony.unshift(ns);
    if(aktivni)state.activeSeason=ns;
    renderSeasonSelect();
    if(aktivni){document.getElementById('season-select').value=ns.id;onSeasonChange();}
    closeModal('modal-sezona');
    document.getElementById('in-sezona-nazev').value='';
    document.getElementById('in-sezona-aktivni').checked=false;
    toast('Sezóna vytvořena','success');
  }catch(e){toast('Chyba: '+e.message,'error');}
}

/* ─── SAVE ZÁPAS ─── */
async function saveZapas(){
  const datum=document.getElementById('in-zapas-datum').value;
  const soupet=document.getElementById('in-zapas-soupet').value.trim();
  if(!datum||!soupet){toast('Zadej datum a soupeře','error');return;}
  const sid=currentSeasonId();
  const body={datum,soupet,cas:document.getElementById('in-zapas-cas').value||null,misto:document.getElementById('in-zapas-misto').value,stav:'planovany'};
  if(sid)body.sezona_id=sid;
  try{
    const res=await api('POST','vb_zapasy',body);
    state.zapasy.unshift(res[0]);
    closeModal('modal-zapas');
    document.getElementById('in-zapas-datum').value='';
    document.getElementById('in-zapas-soupet').value='';
    renderZapasy();renderPrehled();renderLiveSelect();
    toast('Zápas přidán','success');
  }catch(e){toast('Chyba: '+e.message,'error');}
}

/* ─── DELETE ZÁPAS ─── */
async function deleteZapas(id){
  if(!confirm('Opravdu smazat zápas?'))return;
  try{
    await fetch(`${SB_URL}/rest/v1/vb_zapasy?id=eq.${id}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    state.zapasy=state.zapasy.filter(z=>z.id!==id);
    state.statistiky=state.statistiky.filter(s=>s.zapas_id!==id);
    renderZapasy();renderPrehled();renderLiveSelect();
    toast('Zápas smazán','success');
  }catch(e){toast('Chyba: '+e.message,'error');}
}

/* ─── SAVE HRÁČ ─── */
async function saveHrac(){
  const jmeno=document.getElementById('in-hrac-jmeno').value.trim();
  if(!jmeno){toast('Zadej jméno','error');return;}
  const cislo=document.getElementById('in-hrac-cislo').value;
  const pozice=document.getElementById('in-hrac-pozice').value;
  try{
    const res=await api('POST','vb_hraci',{jmeno,cislo:cislo?parseInt(cislo):null,pozice});
    const nh=res[0];
    state.hraci.push(nh);
    state.hraci.sort((a,b)=>a.jmeno.localeCompare(b.jmeno));
    // auto-add to current season
    const sid=currentSeasonId();
    if(sid){
      await apiUpsert('vb_hraci_sezony',{hrac_id:nh.id,sezona_id:sid},'hrac_id,sezona_id');
      state.hraciSezony.push({hrac_id:nh.id,sezona_id:sid});
    }
    closeModal('modal-hrac');
    document.getElementById('in-hrac-jmeno').value='';
    document.getElementById('in-hrac-cislo').value='';
    renderTym();renderPrehled();renderLiveSelect();
    toast('Hráčka přidána','success');
  }catch(e){toast('Chyba: '+e.message,'error');}
}

/* ─── VÝSLEDEK ─── */
function editVysledek(zapasId,finish=false){
  const z=state.zapasy.find(z=>z.id===zapasId);if(!z)return;
  document.getElementById('vysledek-zapas-id').value=zapasId;
  document.getElementById('modal-vysledek').querySelector('.modal-title').textContent=finish?'✅ Ukončit zápas':'📝 Výsledek zápasu';
  document.getElementById('in-sety-my').value=z.sety_my??'';
  document.getElementById('in-sety-oni').value=z.sety_oni??'';
  document.getElementById('in-vysledek-poznamka').value=z.poznamka||'';
  // sets detail
  let html='';
  for(let i=1;i<=5;i++){
    html+=`<div class="form-row" style="margin-bottom:8px">
      <div class="form-group"><label class="form-label">${i}. set — MY</label><input type="number" class="form-input" id="in-set${i}-my" value="${z[`set${i}_my`]??''}" placeholder="—" min="0" /></div>
      <div class="form-group"><label class="form-label">${i}. set — ONI</label><input type="number" class="form-input" id="in-set${i}-oni" value="${z[`set${i}_oni`]??''}" placeholder="—" min="0" /></div>
    </div>`;
  }
  document.getElementById('sets-detail-form').innerHTML=html;
  openModal('modal-vysledek');
}

async function saveVysledek(){
  const id=parseInt(document.getElementById('vysledek-zapas-id').value);
  const setyMy=document.getElementById('in-sety-my').value;
  const setyOni=document.getElementById('in-sety-oni').value;
  const body={stav:'dokonceny',sety_my:setyMy!==''?parseInt(setyMy):null,sety_oni:setyOni!==''?parseInt(setyOni):null,poznamka:document.getElementById('in-vysledek-poznamka').value||null};
  for(let i=1;i<=5;i++){
    const my=document.getElementById(`in-set${i}-my`).value;
    const oni=document.getElementById(`in-set${i}-oni`).value;
    body[`set${i}_my`]=my!==''?parseInt(my):null;
    body[`set${i}_oni`]=oni!==''?parseInt(oni):null;
  }
  try{
    const res=await apiPatch('vb_zapasy',id,body);
    const idx=state.zapasy.findIndex(z=>z.id===id);
    if(idx>=0)state.zapasy[idx]={...state.zapasy[idx],...(res&&res[0]?res[0]:body)};
    closeModal('modal-vysledek');
    renderZapasy();renderPrehled();renderLiveSelect();renderStatistiky();
    if(state.liveZapasId===id){
      document.getElementById('btn-end-zapas').style.display='none';
      document.getElementById('btn-start-zapas').style.display='none';
    }
    toast('Výsledek uložen','success');
  }catch(e){toast('Chyba: '+e.message,'error');}
}

/* ─── UI HELPERS ─── */
function showTab(name){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const tabs={prehled:0,zapasy:1,tym:2,live:3,statistiky:4};
  document.querySelectorAll('.nav-tab')[tabs[name]]?.classList.add('active');
  if(name==='live'&&state.liveZapasId)renderLiveTable(state.liveZapasId);
  if(name==='statistiky')renderStatistiky();
}

function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}

document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
});

let toastTimer;
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show '+(type==='error'?'error':'success');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.classList.remove('show');},2800);
}

// set today as default for new match
document.getElementById('in-zapas-datum').valueAsDate=new Date();

init();
</script>
